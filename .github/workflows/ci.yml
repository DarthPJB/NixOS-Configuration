jobs:
  build-arm:
    name: Build ARM Configurations
    needs:
    - validation
    - security
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@main
    - name: Setup Magic Nix Cache
      uses: DeterminateSystems/magic-nix-cache-action@main
    - name: Build configuration
      run: nixos-rebuild build --flake .#${{ matrix.machine }}
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.machine }}-config
        path: result/
        retention-days: '7'
    strategy:
      fail-fast: false
      matrix:
        machine:
        - display-0
        - display-1
        - display-2
        - print-controller
        - beta-one
  build-x86:
    name: Build x86_64 Configurations
    needs:
    - validation
    - security
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@main
    - name: Setup Magic Nix Cache
      uses: DeterminateSystems/magic-nix-cache-action@main
    - name: Build configuration
      run: nixos-rebuild build --flake .#${{ matrix.machine }}
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.machine }}-config
        path: result/
        retention-days: '7'
    strategy:
      fail-fast: false
      matrix:
        machine:
        - terminal-zero
        - terminal-nx-01
        - cortex-alpha
        - local-nas
        - alpha-one
        - alpha-two
        - alpha-three
        - LINDA
        - gaming-host-1
        - remote-worker
        - storage-array
        - remote-builder
        - local-worker
        - obs-box
  deploy-prep:
    if: github.event_name == 'workflow_dispatch'
    name: Deploy - ${{ github.event.inputs.machine }}
    needs:
    - validation
    - security
    - build-x86
    - build-arm
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@main
    - name: Setup Magic Nix Cache
      uses: DeterminateSystems/magic-nix-cache-action@main
    - name: Build configuration
      run: nixos-rebuild build --flake .#${{ github.event.inputs.machine }}
    - if: github.event.inputs.action == 'test'
      name: Test deployment
      run: nix run .#${{ github.event.inputs.machine }}
    - if: github.event.inputs.action == 'deploy'
      name: Deploy to machine
      run: nix run .#${{ github.event.inputs.machine }} -- switch
    - if: always()
      name: Upload deployment logs
      uses: actions/upload-artifact@v4
      with:
        name: deploy-${{ github.event.inputs.machine }}-logs
        path: /tmp/deploy-*.log
        retention-days: '30'
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: '0'
    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@main
    - name: Install Gitleaks
      run: nix-shell -p gitleaks --run 'gitleaks version'
    - name: Run Gitleaks secret scanning
      run: nix-shell -p gitleaks --run 'gitleaks detect --source . --verbose'
    - name: Check for plaintext secrets in Nix files
      run: "echo \"Checking for potential secrets in Nix files...\"\n\n# Enhanced\
        \ pattern matching\nPATTERNS=\"password|secret|key|token|api_key|apikey|access_key|private_key\"\
        \nEXCLUDES=\"secrix|public|pub|README|documentation|\\.pub$|_pub$\"\n\nif\
        \ grep -rE \"$PATTERNS\" --include=\"*.nix\" . | grep -vE \"$EXCLUDES\"; then\n\
        \  echo \"\u26A0\uFE0F  Potential secrets found in Nix files\"\n  echo \"\
        Review the above matches manually\"\n  # Don't fail - just warn for now\n\
        else\n  echo \"\u2705 No obvious secrets found in Nix files\"\nfi\n"
    - name: Validate secrix configuration
      run: nix run .#secrix -- --help
    - name: Check for hardcoded IPs
      run: "echo \"Checking for hardcoded IP addresses...\"\n# Look for IP patterns\
        \ but exclude documentation\nif grep -rE \"[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}\\\
        .[0-9]{1,3}\" --include=\"*.nix\" . | grep -v \"10.88.127\" | grep -v \"127.0.0.1\"\
        \ | grep -v \"documentation\"; then\n  echo \"\u26A0\uFE0F  Non-standard IP\
        \ addresses found (excluding VPN range)\"\nelse\n  echo \"\u2705 IP addresses\
        \ appear standard\"\nfi\n"
  validation:
    name: Validation & Linting
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@main
    - name: Setup Magic Nix Cache
      uses: DeterminateSystems/magic-nix-cache-action@main
    - name: Format check
      run: nix fmt -- --check .
    - name: Flake check
      run: nix flake check
    - name: Dead code check
      run: nix run .#deadnix
name: NixOS CI/CD
'on':
  pull_request:
    branches:
    - main
    paths:
    - '**.nix'
    - flake.lock
  push:
    branches:
    - main
    - jb/ai/overlord-8
    paths:
    - '**.nix'
    - flake.lock
    - .github/workflows/**
  workflow_dispatch:
    inputs:
      action:
        default: build
        description: Deployment action
        options:
        - build
        - test
        - deploy
        required: true
        type: choice
      machine:
        description: Machine to deploy
        options:
        - terminal-zero
        - terminal-nx-01
        - cortex-alpha
        - local-nas
        - alpha-one
        - alpha-two
        - alpha-three
        - LINDA
        - gaming-host-1
        - remote-worker
        - storage-array
        - remote-builder
        - local-worker
        - obs-box
        - display-0
        - display-1
        - display-2
        - print-controller
        - beta-one
        required: true
        type: choice
permissions:
  contents: read
  deployments: write

